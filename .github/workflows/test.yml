name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build binary (for e2e tests)
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -o unictx ./cmd/unictx
      - name: Run unit + integration tests
        run: CGO_ENABLED=1 go test -race -tags sqlite_fts5 -timeout 5m ./...
      - name: Run E2E tests
        env:
          UNICTX_BIN: ${{ github.workspace }}/unictx
        run: CGO_ENABLED=1 go test -tags 'e2e,sqlite_fts5' -timeout 5m ./internal/cli/...
